<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Pampa Gelateria — Votre avis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #070707;
    --bg-radial: #121210;
    --text-primary: #ECE7DC;
    --text-muted: #9C978C;
    --gold: #C9A661;
    --gold-soft: rgba(201,166,97,0.16);
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    color:var(--text-primary);
    min-height:100vh;
    font-family:'Jost',sans-serif;
    overflow-x:hidden;
  }
  .stars{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
  }
  .star{
    position:absolute;
    width:2px;
    height:2px;
    border-radius:50%;
    background:var(--text-muted);
    opacity:0.5;
    animation:twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{opacity:0.15;}
    50%{opacity:0.7;}
  }
  .page{
    position:relative;
    z-index:1;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:48px 24px 64px;
  }
  .glow-wrap{
    position:relative;
    width:min(64vw, 300px);
    margin-bottom:8px;
  }
  .glow{
    position:absolute;
    inset:-40%;
    background:radial-gradient(circle, var(--gold-soft) 0%, transparent 68%);
    animation:breathe 5s ease-in-out infinite;
    z-index:0;
  }
  @keyframes breathe{
    0%,100%{transform:scale(0.9); opacity:0.6;}
    50%{transform:scale(1.08); opacity:1;}
  }
  .logo{
    position:relative;
    z-index:1;
    width:100%;
    display:block;
    filter:drop-shadow(0 0 24px rgba(201,166,97,0.12));
  }
  .eyebrow{
    letter-spacing:0.34em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold);
    margin:28px 0 14px;
    font-weight:400;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-size:clamp(28px, 5vw, 40px);
    line-height:1.25;
    margin:0 0 18px;
    max-width:520px;
    color:var(--text-primary);
  }
  h1 em{
    font-style:italic;
    color:var(--gold);
  }
  p.sub{
    font-size:15px;
    line-height:1.7;
    color:var(--text-muted);
    max-width:420px;
    margin:0 0 38px;
    font-weight:300;
  }
  .cta{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:16px 34px;
    background:linear-gradient(180deg, #D9B571, #B4903F);
    color:#0A0A0A;
    text-decoration:none;
    font-family:'Jost',sans-serif;
    font-weight:500;
    font-size:14px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    border-radius:2px;
    box-shadow:0 8px 24px rgba(201,166,97,0.22);
    transition:transform 0.25s ease, box-shadow 0.25s ease;
  }
  .cta:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 30px rgba(201,166,97,0.32);
  }
  .cta svg{
    width:16px;
    height:16px;
    flex-shrink:0;
  }
  .stars-row{
    display:flex;
    gap:6px;
    margin-top:26px;
    color:var(--gold);
    font-size:18px;
    letter-spacing:2px;
  }
  .footnote{
    margin-top:34px;
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:#514E46;
  }
  @media (max-width:420px){
    .glow-wrap{width:56vw;}
  }
</style>
</head>

    s.style.width = s.style.height = (Math.random()*1.5+1)+'px';
    starsContainer.appendChild(s);
  }
</script>
